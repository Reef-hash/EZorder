name: Build iOS IPA

on:
  workflow_dispatch:   # Manual trigger only — iOS not yet ready for App Store

jobs:
  build-ios:
    name: Build iOS IPA
    runs-on: macos-latest   # macOS runner — required for Xcode
    env:
      HAS_APPLE_CERT: ${{ secrets.APPLE_CERTIFICATE_BASE64 != '' }}

    steps:
      # ── 1. Checkout ──────────────────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── 2. Select Xcode version ──────────────────────────────────────────────
      - name: Select Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: 'latest-stable'

      # ── 3. Node.js setup ─────────────────────────────────────────────────────
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      # ── 4. Install frontend dependencies ─────────────────────────────────────
      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      # ── 5. Build Next.js static export ───────────────────────────────────────
      - name: Build Next.js (static export for Capacitor)
        working-directory: frontend
        env:
          NEXT_PUBLIC_MOBILE_BUILD: 'true'
          NEXT_PUBLIC_API_URL: ${{ secrets.NEXT_PUBLIC_API_URL }}
        run: npm run build:mobile

      # ── 6. Sync Capacitor web assets ─────────────────────────────────────────
      - name: Capacitor sync
        working-directory: frontend
        run: npx cap sync ios

      # ── 7. Install CocoaPods dependencies ────────────────────────────────────
      - name: Install CocoaPods
        working-directory: frontend/ios/App
        run: pod install

      # ── 8. Build for simulator (no signing — always runs) ────────────────────
      - name: Build for iOS Simulator (no signing)
        working-directory: frontend/ios
        run: |
          xcodebuild build \
            -workspace App/App.xcworkspace \
            -scheme App \
            -sdk iphonesimulator \
            -configuration Debug \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            -derivedDataPath build/

      # ── 9. Build & Archive for device (signed — requires secrets) ────────────
      #  Requires these GitHub Secrets:
      #    APPLE_CERTIFICATE_BASE64   — P12 cert (base64)
      #    APPLE_CERTIFICATE_PASSWORD — P12 password
      #    APPLE_PROVISIONING_PROFILE — mobileprovision file (base64)
      #    APPLE_TEAM_ID              — e.g. ABCD123456
      - name: Install Apple certificate & provisioning profile
        if: env.HAS_APPLE_CERT == 'true'
        env:
          APPLE_CERTIFICATE_BASE64: ${{ secrets.APPLE_CERTIFICATE_BASE64 }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_PROVISIONING_PROFILE: ${{ secrets.APPLE_PROVISIONING_PROFILE }}
          KEYCHAIN_PASSWORD: ${{ github.run_id }}
        run: |
          # Create temp keychain
          security create-keychain -p "$KEYCHAIN_PASSWORD" build.keychain
          security default-keychain -s build.keychain
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" build.keychain
          security set-keychain-settings -t 3600 -u build.keychain

          # Import certificate
          echo "$APPLE_CERTIFICATE_BASE64" | base64 -d > certificate.p12
          security import certificate.p12 -k build.keychain -P "$APPLE_CERTIFICATE_PASSWORD" \
            -T /usr/bin/codesign -T /usr/bin/xcodebuild
          security set-key-partition-list -S apple-tool:,apple: -s -k "$KEYCHAIN_PASSWORD" build.keychain

          # Install provisioning profile
          echo "$APPLE_PROVISIONING_PROFILE" | base64 -d > profile.mobileprovision
          mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
          cp profile.mobileprovision ~/Library/MobileDevice/Provisioning\ Profiles/
          rm certificate.p12 profile.mobileprovision

      - name: Archive iOS app (signed)
        if: env.HAS_APPLE_CERT == 'true'
        working-directory: frontend/ios
        env:
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          xcodebuild archive \
            -workspace App/App.xcworkspace \
            -scheme App \
            -sdk iphoneos \
            -configuration Release \
            -archivePath build/App.xcarchive \
            DEVELOPMENT_TEAM="$APPLE_TEAM_ID" \
            CODE_SIGN_STYLE=Manual \
            -allowProvisioningUpdates

      - name: Export IPA
        if: env.HAS_APPLE_CERT == 'true'
        working-directory: frontend/ios
        run: |
          cat > ExportOptions.plist << 'EOF'
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>method</key>
            <string>app-store</string>
            <key>teamID</key>
            <string>${{ secrets.APPLE_TEAM_ID }}</string>
            <key>uploadBitcode</key>
            <false/>
            <key>compileBitcode</key>
            <false/>
          </dict>
          </plist>
          EOF
          xcodebuild -exportArchive \
            -archivePath build/App.xcarchive \
            -exportPath build/ipa \
            -exportOptionsPlist ExportOptions.plist

      # ── 10. Upload artifacts ──────────────────────────────────────────────────
      - name: Upload Simulator Build
        uses: actions/upload-artifact@v4
        with:
          name: EZOrder-ios-simulator-${{ github.sha }}
          path: frontend/ios/build/Build/Products/Debug-iphonesimulator/App.app
          retention-days: 14

      - name: Upload IPA
        if: env.HAS_APPLE_CERT == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: EZOrder-ios-${{ github.sha }}.ipa
          path: frontend/ios/build/ipa/*.ipa
          retention-days: 30
