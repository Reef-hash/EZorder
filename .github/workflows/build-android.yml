name: Build Android APK

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:   # Allow manual trigger from GitHub UI

jobs:
  build-android:
    name: Build Android APK
    runs-on: ubuntu-latest

    steps:
      # ── 1. Checkout ──────────────────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── 2. Node.js setup ─────────────────────────────────────────────────────
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      # ── 3. Install frontend dependencies ─────────────────────────────────────
      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      # ── 4. Build Next.js static export ───────────────────────────────────────
      - name: Build Next.js (static export for Capacitor)
        working-directory: frontend
        env:
          NEXT_PUBLIC_MOBILE_BUILD: 'true'
          NEXT_PUBLIC_API_URL: ${{ secrets.NEXT_PUBLIC_API_URL }}
        run: npm run build:mobile

      # ── 5. Sync Capacitor web assets ─────────────────────────────────────────
      - name: Capacitor sync
        working-directory: frontend
        run: npx cap sync android

      # ── 6. Java setup ────────────────────────────────────────────────────────
      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      # ── 7. Android SDK ───────────────────────────────────────────────────────
      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      # ── 8. Build DEBUG APK (no signing needed) ───────────────────────────────
      - name: Build Debug APK
        working-directory: frontend/android
        run: ./gradlew assembleDebug --no-daemon

      # ── 9. Build RELEASE APK (signed — requires secrets) ─────────────────────
      #  Only runs if KEYSTORE_BASE64 secret is set
      - name: Build Release APK (signed)
        if: ${{ secrets.KEYSTORE_BASE64 != '' }}
        working-directory: frontend/android
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
          STORE_PASSWORD: ${{ secrets.STORE_PASSWORD }}
        run: |
          echo "$KEYSTORE_BASE64" | base64 -d > keystore.jks
          ./gradlew assembleRelease \
            -Pandroid.injected.signing.store.file=$(pwd)/keystore.jks \
            -Pandroid.injected.signing.store.password=$STORE_PASSWORD \
            -Pandroid.injected.signing.key.alias=$KEY_ALIAS \
            -Pandroid.injected.signing.key.password=$KEY_PASSWORD \
            --no-daemon
          rm keystore.jks

      # ── 10. Upload artifacts ──────────────────────────────────────────────────
      - name: Upload Debug APK
        uses: actions/upload-artifact@v4
        with:
          name: EZOrder-debug-${{ github.sha }}
          path: frontend/android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30

      - name: Upload Release APK
        if: ${{ secrets.KEYSTORE_BASE64 != '' }}
        uses: actions/upload-artifact@v4
        with:
          name: EZOrder-release-${{ github.sha }}
          path: frontend/android/app/build/outputs/apk/release/app-release.apk
          retention-days: 30
